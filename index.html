<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>harryc.ai — Harry Cai · Senior Cloud Architect</title>

<!-- Google Fonts: IBM Plex Mono + Sans -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  html, body { margin: 0; padding: 0; background: #0E0D10; }
  body { font-family: 'IBM Plex Mono', monospace; -webkit-font-smoothing: antialiased; color: #ECE9DF; }
  #root { width: 100%; min-height: 100vh; }

  /* Subtle scrollbar that fits the dark theme. */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: #16151A; }
  ::-webkit-scrollbar-thumb { background: #2A2731; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #3a3641; }

  /* Polish image-slot to match the terminal aesthetic. */
  image-slot { --is-border: 1px dashed #2A2731; --is-bg: #0A0910; --is-color: #6D6957; }

  /* ───────────────────────────────────────────────────────────────────────
     Mobile overrides. Classes below are no-ops on desktop (no rules attached),
     so this is invisible at ≥721px. On narrow screens, !important rules win
     over the inline styles in the React components.
     ─────────────────────────────────────────────────────────────────────── */
  @media (max-width: 720px) {
    /* Section side padding — pull in from 26px so cards fill the viewport. */
    .hc-sec { padding-left: 14px !important; padding-right: 14px !important; }

    /* Window chrome title can wrap or overflow — shrink and ellipsis. */
    .hc-chrome-title {
      font-size: 10.5px !important;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Banner: tighter top padding; ASCII art shrinks dramatically. */
    .hc-banner { padding: 18px 14px 4px !important; }
    .hc-ascii { font-size: 6px !important; line-height: 1.05 !important; }
    .hc-banner-card { padding: 12px 14px !important; font-size: 12px !important; }

    /* HuggingFace model card: avatar above frontmatter, not beside. */
    .hc-hf-body {
      grid-template-columns: 1fr !important;
      gap: 16px !important;
      padding: 16px !important;
    }
    .hc-hf-avatar { width: 132px !important; height: 132px !important; }
    .hc-hf-row {
      grid-template-columns: 110px 1fr !important;
      font-size: 12px !important;
    }
    .hc-hf-header { font-size: 10.5px !important; padding: 8px 12px !important; }
    .hc-hf-header-meta { gap: 8px !important; }

    /* Career timeline rows: stack date column above content. */
    .hc-career-row {
      grid-template-columns: 1fr !important;
      gap: 6px !important;
    }

    /* Qualifications: single column. */
    .hc-qual-grid { grid-template-columns: 1fr !important; }

    /* AskUserQuestion: stack three options vertically. */
    .hc-ask-options { grid-template-columns: 1fr !important; }

    /* Offer form: duration + start date stack, drop the left border. */
    .hc-form-side { grid-template-columns: 1fr !important; }
    .hc-form-side-2 { border-left: none !important; }

    /* Publications: spine ribbon gets tighter; body must allow shrinking
       below its min-content (the BibTeX pre block) or it blows out the viewport. */
    .hc-pub-spine { padding: 0 4px !important; }
    .hc-pub-body {
      padding: 14px 16px !important;
      min-width: 0 !important;
      overflow: hidden !important;
    }

    /* Status bar: wrap items, smaller gaps. */
    .hc-status { gap: 8px !important; font-size: 10px !important; }

    /* Plan / MCP banner: allow wrap. */
    .hc-mcp { font-size: 11px !important; gap: 8px !important; }

    /* Calendar iframe — give it more vertical room since it's narrow now. */
    .hc-cal-iframe { height: 720px !important; }

    /* Hero card maxWidth was 680 — release on mobile. */
    .hc-banner-card { max-width: none !important; }

    /* Recent projects header (service · project · region) wraps with smaller gap. */
    .hc-svc-header { font-size: 11px !important; }
  }

  @media (max-width: 420px) {
    /* Very narrow: even smaller ASCII. */
    .hc-ascii { font-size: 4.5px !important; }
    .hc-hf-row { grid-template-columns: 95px 1fr !important; font-size: 11.5px !important; }
  }
</style>

<!-- React + Babel (pinned) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Image slot web component (drag-drop avatar) -->
<script src="image-slot.js"></script>

<!-- Shared data + hooks -->
<script src="src/data.js"></script>
<script type="text/babel" src="src/hooks.jsx"></script>

<!-- Sections: core, sequence (2–6), ask-user (7) -->
<script type="text/babel" src="src/TerminalAI.jsx"></script>
<script type="text/babel" src="src/TerminalAISeq.jsx"></script>
<script type="text/babel" src="src/TerminalAIAsk.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
function App() {
  return <TerminalAI />;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
